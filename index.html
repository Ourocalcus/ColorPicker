<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Color Wheel Picker</title>

  <!-- Montserrat font -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

  <!-- iro.js color wheel -->
  <script src="https://cdn.jsdelivr.net/npm/@jaames/iro@5"></script>

  <style>
    body {
      font-family: 'Montserrat', sans-serif;
      padding: 20px;
      background: transparent; /* fully transparent */
      color: #fff;
      text-align: center;
    }

    h2 {
      font-weight: 600;
      margin-bottom: 20px;
      color: #fff;
    }

    #pickerContainer {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }

    .info-block {
      margin-top: 10px;
      line-height: 1.8;
      font-size: 18px;
      color: #fff;
    }
  </style>
</head>
<body>

  <h2>Pick a Color</h2>

  <div id="pickerContainer">
    <div id="colorWheel"></div>
  </div>

  <div class="info-block">
    <div id="hex">Hex: #ffffff</div>
    <div id="rgb">RGB: 255, 255, 255</div>
  </div>

  <script>
    // Create the color wheel
    const colorPicker = new iro.ColorPicker("#colorWheel", {
      width: 260,
      color: "#ffffff",
      layout: [
        { component: iro.ui.Wheel },
        { component: iro.ui.Slider, options: { sliderType: 'saturation' }},
        { component: iro.ui.Slider, options: { sliderType: 'value' }}
      ]
    });

    const hexText = document.getElementById("hex");
    const rgbText = document.getElementById("rgb");

    // Update text when color changes
    colorPicker.on("color:change", (color) => {
      hexText.textContent = `Hex: ${color.hexString}`;
      rgbText.textContent = `RGB: ${color.rgb.r}, ${color.rgb.g}, ${color.rgb.b}`;
    });
  </script>

</body>
</html>
