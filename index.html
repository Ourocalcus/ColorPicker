<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Color Wheel Picker</title>

  <!-- Montserrat font -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

  <!-- iro.js color wheel -->
  <script src="https://cdn.jsdelivr.net/npm/@jaames/iro@5"></script>

  <style>
    body {
      font-family: 'Montserrat', sans-serif;
      margin: 0;
      padding: 10px 0; /* reduced vertical padding */
      background: transparent;
      color: #fff;
      text-align: center;
    }

    h2 {
      font-weight: 600;
      margin: 0 0 10px 0; /* very small margin */
      color: #fff;
      font-size: 20px;
    }

    #pickerContainer {
      display: flex;
      justify-content: center;
      margin: 0; /* remove extra spacing */
    }

    .info-block {
      margin-top: 8px; /* small spacing */
      line-height: 1.4;
      font-size: 16px;
      color: #fff;
    }

    .copy-btn {
      margin-top: 6px;
      padding: 6px 12px;
      font-size: 14px;
      border: 1px solid #fff;
      background: transparent;
      color: #fff;
      border-radius: 4px;
      cursor: pointer;
    }

    .copy-btn:active {
      opacity: 0.6;
    }
  </style>
</head>
<body>

  <h2>Pick a Color</h2>

  <div id="pickerContainer">
    <div id="colorWheel"></div>
  </div>

  <div class="info-block">
    <div id="hex">Hex: #ffffff</div>
    <button class="copy-btn" onclick="copyHex()">Copy HEX</button>

    <div id="rgb" style="margin-top:6px;">RGB: 255, 255, 255</div>
    <button class="copy-btn" onclick="copyRGB()">Copy RGB</button>
  </div>

  <script>
    const colorPicker = new iro.ColorPicker("#colorWheel", {
      width: 260,
      color: "#ffffff",
      layout: [
        { component: iro.ui.Wheel },
        { component: iro.ui.Slider, options: { sliderType: 'saturation' }},
        { component: iro.ui.Slider, options: { sliderType: 'value' }}
      ]
    });

    const hexText = document.getElementById("hex");
    const rgbText = document.getElementById("rgb");

    colorPicker.on("color:change", (color) => {
      hexText.textContent = `Hex: ${color.hexString}`;
      rgbText.textContent = `RGB: ${color.rgb.r}, ${color.rgb.g}, ${color.rgb.b}`;
    });

    function copyHex() {
      navigator.clipboard.writeText(hexText.textContent.replace("Hex: ", ""));
    }

    function copyRGB() {
      navigator.clipboard.writeText(rgbText.textContent.replace("RGB: ", ""));
    }
  </script>

</body>
</html>
