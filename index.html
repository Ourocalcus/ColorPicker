<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Color Picker</title>

  <!-- Montserrat font -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

  <!-- iro.js color wheel -->
  <script src="https://cdn.jsdelivr.net/npm/@jaames/iro@5"></script>

  <style>
    body {
      font-family: 'Montserrat', sans-serif;
      margin: 0;
      padding: 8px 0;
      background: transparent;
      color: #fff;
      text-align: center;
    }

    h2 {
      font-weight: 600;
      margin: 0 0 8px 0;
      font-size: 18px;
    }

    #pickerContainer {
      display: flex;
      justify-content: center;
      margin: 0;
    }

    /* Wheel wrapper ring */
    #colorWheel {
      padding: 4px;
      border-radius: 50%;
      border: 2px solid #fff;
      display: inline-block;
    }

    /* Actual wheel graphic */
    .iro__wheel {
      border-radius: 50%;
      overflow: hidden;
    }

    /* Slider borders */
    .iro__slider {
      border: 2px solid #fff !important;
      border-radius: 6px !important;
      margin-top: 4px !important;
    }

    .row {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-top: 6px;
      font-size: 14px;
    }

    .copy-btn, .native-btn {
      margin-top: 4px;
      padding: 5px 10px;
      font-size: 13px;
      border: 1px solid #fff;
      background: transparent;
      color: #fff;
      border-radius: 4px;
      cursor: pointer;
    }

    .copy-btn:active, .native-btn:active {
      opacity: 0.6;
    }

    #nativePicker {
      display: none;
    }
  </style>
</head>
<body>

  <h2>Pick a Color</h2>

  <div id="pickerContainer">
    <div id="colorWheel"></div>
  </div>

  <input type="color" id="nativePicker">
  <button class="native-btn" onclick="nativePicker.click()">Screen Picker</button>

  <div class="row">
    <div id="hex">Hex: #ffffff</div>
    <div id="rgb">RGB: 255, 255, 255</div>
  </div>

  <div class="row">
    <button class="copy-btn" onclick="copyHex()">Copy HEX</button>
    <button class="copy-btn" onclick="copyRGB()">Copy RGB</button>
  </div>

  <script>
    const colorPicker = new iro.ColorPicker("#colorWheel", {
      width: 240, // slightly smaller to reduce height
      color: "#ffffff",
      layout: [
        { component: iro.ui.Wheel },
        { component: iro.ui.Slider, options: { sliderType: 'saturation' }},
        { component: iro.ui.Slider, options: { sliderType: 'value' }}
      ]
    });

    const hexText = document.getElementById("hex");
    const rgbText = document.getElementById("rgb");
    const nativePicker = document.getElementById("nativePicker");

    colorPicker.on("color:change", (color) => {
      updateValues(color.hexString, color.rgb);
    });

    nativePicker.addEventListener("input", () => {
      const hex = nativePicker.value;
      const r = parseInt(hex.substring(1, 3), 16);
      const g = parseInt(hex.substring(3, 5), 16);
      const b = parseInt(hex.substring(5, 7), 16);

      updateValues(hex, { r, g, b });
      colorPicker.color.hexString = hex;
    });

    function updateValues(hex, rgb) {
      hexText.textContent = `Hex: ${hex}`;
      rgbText.textContent = `RGB: ${rgb.r}, ${rgb.g}, ${rgb.b}`;
    }

    function copyHex() {
      navigator.clipboard.writeText(hexText.textContent.replace("Hex: ", ""));
    }

    function copyRGB() {
      navigator.clipboard.writeText(rgbText.textContent.replace("RGB: ", ""));
    }
  </script>

</body>
</html>
