<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Color Picker</title>

  <!-- Montserrat font -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

  <!-- iro.js color wheel -->
  <script src="https://cdn.jsdelivr.net/npm/@jaames/iro@5"></script>

  <style>
    body {
      font-family: 'Montserrat', sans-serif;
      margin: 0;
      padding: 10px 0;
      background: transparent;
      color: #fff;
      text-align: center;
    }

    h2 {
      font-weight: 600;
      margin: 0 0 10px 0;
      font-size: 20px;
    }

    #pickerContainer {
      display: flex;
      justify-content: center;
      margin: 0;
    }

    /* Side-by-side HEX + RGB */
    .row {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 10px;
      font-size: 16px;
    }

    .copy-btn, .native-btn {
      margin-top: 6px;
      padding: 6px 12px;
      font-size: 14px;
      border: 1px solid #fff;
      background: transparent;
      color: #fff;
      border-radius: 4px;
      cursor: pointer;
    }

    .copy-btn:active, .native-btn:active {
      opacity: 0.6;
    }

    #nativePicker {
      display: none;
    }
  </style>
</head>
<body>

  <h2>Pick a Color</h2>

  <div id="pickerContainer">
    <div id="colorWheel"></div>
  </div>

  <!-- Native system color picker -->
  <input type="color" id="nativePicker">
  <button class="native-btn" onclick="nativePicker.click()">
